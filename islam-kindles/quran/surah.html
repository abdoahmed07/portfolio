<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah — Islam Kindles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <style>
        /* ── SURAH HEADER ── */
        .surah-hero {
            text-align: center;
            padding: 48px 0 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .surah-hero-num {
            font-family: var(--font-m);
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
            display: block;
        }

        .surah-hero-arabic {
            font-family: 'Amiri', serif;
            font-size: clamp(2.5rem, 7vw, 4rem);
            color: var(--accent);
            direction: rtl;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .surah-hero-name {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }

        .surah-hero-english {
            font-family: var(--font-m);
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 300;
        }

        .surah-hero-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }

        .meta-pill {
            font-family: var(--font-m);
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 5px 14px;
            border-radius: 100px;
        }

        /* ── BISMILLAH ── */
        .bismillah {
            font-family: 'Amiri', serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: var(--muted);
            direction: rtl;
            text-align: center;
            padding: 24px 0 32px;
            letter-spacing: 0.02em;
        }

        /* ── VIEW TOGGLE ── */
        .view-toggle {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 36px;
        }

        .view-btn {
            font-family: var(--font-m);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 7px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .view-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── VERSES ── */
        .verses-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .verse {
            display: grid;
            grid-template-columns: 36px 1fr;
            gap: 20px;
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
            align-items: start;
            animation: fadeUp 0.3s ease both;
        }

        .verse:last-child { border-bottom: none; }

        .verse-num {
            font-family: var(--font-m);
            font-size: 0.65rem;
            color: var(--accent);
            background: var(--accent-dim);
            border-radius: 6px;
            padding: 5px 4px;
            text-align: center;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .verse-content { display: flex; flex-direction: column; gap: 14px; }

        .verse-arabic {
            font-family: 'Amiri', serif;
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            direction: rtl;
            text-align: right;
            line-height: 2;
            color: var(--text);
        }

        .verse-translation {
            font-family: var(--font-m);
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.8;
        }

        /* view modes */
        body.arabic-only .verse-translation { display: none; }
        body.translation-only .verse-arabic { display: none; }

        /* ── NAV ARROWS ── */
        .surah-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0 20px;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        .surah-nav-btn {
            font-family: var(--font-m);
            font-size: 0.75rem;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
            letter-spacing: 0.04em;
        }

        .surah-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .surah-nav-btn.hidden { visibility: hidden; }

        /* ── LOADING / ERROR ── */
        .loading-state {
            text-align: center;
            padding: 80px 0;
            font-family: var(--font-m);
            font-size: 0.88rem;
            color: var(--muted);
        }

        .loading-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 1s ease infinite;
            margin: 0 2px;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%,100% { opacity: 0.2; }
            50%      { opacity: 1; }
        }

        .error-state {
            text-align: center;
            padding: 60px 0;
            font-family: var(--font-m);
            font-size: 0.88rem;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            .verse { grid-template-columns: 28px 1fr; gap: 12px; }
            .verse-arabic { font-size: 1.3rem; }
        }
    </style>
</head>

const params = new URLSearchParams(window.location.search);
const surahId = parseInt(params.get("id")) || 1;
const meta = SURAH_META[surahId];

if (meta) document.title = `${meta[0]} — Islam Kindles`;

let viewMode = "both"; // both | arabic | translation

async function loadSurah(id) {
    const content = document.getElementById("surahContent");

    try {
        // Fetch Arabic and English in parallel
        const [arRes, enRes] = await Promise.all([
            fetch(`https://api.alquran.cloud/v1/surah/${id}`),
            fetch(`https://api.alquran.cloud/v1/surah/${id}/en.sahih`)
        ]);

        if (!arRes.ok || !enRes.ok) throw new Error("API error");

        const [arData, enData] = await Promise.all([arRes.json(), enRes.json()]);

        const arAyahs = arData.data.ayahs;
        const enAyahs = enData.data.ayahs;
        const [name, arabic, english, verses, type] = meta;

        // Build page
        const showBismillah = id !== 1 && id !== 9;

        content.innerHTML = `
            <a href="index.html" style="
                font-family: var(--font-m);
                font-size: 0.72rem;
                color: var(--muted);
                text-decoration: none;
                letter-spacing: 0.05em;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 32px;
                transition: color 0.2s;
            " onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
                ← All Surahs
            </a>

            <div class="surah-hero">
                <span class="surah-hero-num">Surah ${id} · ${type} · ${verses} verses</span>
                <div class="surah-hero-arabic">${arabic}</div>
                <h1 class="surah-hero-name">${name}</h1>
                <div class="surah-hero-english">${english}</div>
            </div>

            <div class="view-toggle">
                <button class="view-btn ${viewMode==='both'?'active':''}" onclick="setView('both')">Arabic + Translation</button>
                <button class="view-btn ${viewMode==='arabic'?'active':''}" onclick="setView('arabic')">Arabic Only</button>
                <button class="view-btn ${viewMode==='translation'?'active':''}" onclick="setView('translation')">Translation Only</button>
            </div>

            ${showBismillah ? '<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>' : ''}

            <div class="verses-list" id="versesList">
                ${arAyahs.map((ayah, i) => `
                    <div class="verse" style="animation-delay:${Math.min(i*0.02,0.5)}s">
                        <span class="verse-num">${ayah.numberInSurah}</span>
                        <div class="verse-content">
                            <div class="verse-arabic">${ayah.text}</div>
                            <div class="verse-translation">${enAyahs[i]?.text || ""}</div>
                        </div>
                    </div>
                `).join("")}
            </div>

            <div class="surah-nav">
                ${id > 1
                    ? `<a class="surah-nav-btn" href="surah.html?id=${id-1}">← ${SURAH_META[id-1][0]}</a>`
                    : `<span class="surah-nav-btn hidden"></span>`
                }
                <a href="index.html" style="font-family:var(--font-m);font-size:0.7rem;color:var(--muted);text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">All Surahs</a>
                ${id < 114
                    ? `<a class="surah-nav-btn" href="surah.html?id=${id+1}">${SURAH_META[id+1][0]} →</a>`
                    : `<span class="surah-nav-btn hidden"></span>`
                }
            </div>
        `;

        applyViewMode();

    } catch (e) {
        content.innerHTML = `
            <div class="error-state">
                <p style="margin-bottom:12px">Could not load surah. Please check your internet connection.</p>
                <a href="index.html" style="color:var(--accent);font-family:var(--font-m);font-size:0.8rem;">← Back to Quran</a>
            </div>
        `;
    }
}

function setView(mode) {
    viewMode = mode;
    document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    applyViewMode();
}

function applyViewMode() {
    document.body.classList.remove("arabic-only", "translation-only");
    if (viewMode === "arabic")      document.body.classList.add("arabic-only");
    if (viewMode === "translation") document.body.classList.add("translation-only");
}

document.getElementById("menuToggle").addEventListener("click", () => {
    document.getElementById("navLinks").classList.toggle("open");
});

loadSurah(surahId);
</script>
</body>
