    <style>
        .search-bar {
            width: 100%;
            padding: 13px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font-m);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 28px;
        }
        .search-bar:focus { border-color: var(--accent); }
        .search-bar::placeholder { color: var(--muted); }

        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 9px;
        }

        .surah-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s, background 0.15s, transform 0.15s;
        }

        .surah-card:hover {
            border-color: rgba(16,185,129,0.4);
            background: var(--surface2);
            transform: translateY(-2px);
        }

        .surah-num {
            font-family: var(--font-m);
            font-size: 0.62rem;
            color: var(--accent);
            min-width: 28px;
            text-align: center;
            background: var(--accent-dim);
            border-radius: 6px;
            padding: 4px 5px;
            flex-shrink: 0;
        }

        .surah-info { flex: 1; min-width: 0; }

        .surah-name {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .surah-row2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 3px;
            gap: 6px;
        }

        .surah-english {
            font-family: var(--font-m);
            font-size: 0.63rem;
            color: var(--muted);
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .surah-arabic {
            font-size: 0.82rem;
            color: var(--muted);
            direction: rtl;
            flex-shrink: 0;
        }

        .surah-meta {
            font-family: var(--font-m);
            font-size: 0.58rem;
            color: var(--muted);
            margin-top: 2px;
            opacity: 0.7;
        }

        .no-results {
            font-family: var(--font-m);
            font-size: 0.88rem;
            color: var(--muted);
            text-align: center;
            padding: 40px 0;
            display: none;
        }
    </style>
</head>

const grid = document.getElementById("surahGrid");
const noResults = document.getElementById("noResults");

function renderSurahs(list) {
    grid.innerHTML = "";
    noResults.style.display = list.length === 0 ? "block" : "none";
    list.forEach(([num, translit, arabic, english, verses, type]) => {
        const a = document.createElement("a");
        a.className = "surah-card";
        a.href = `surah.html?id=${num}`;
        a.innerHTML = `
            <span class="surah-num">${num}</span>
            <div class="surah-info">
                <div class="surah-name">${translit}</div>
                <div class="surah-row2">
                    <span class="surah-english">${english}</span>
                    <span class="surah-arabic">${arabic}</span>
                </div>
                <div class="surah-meta">${verses} verses · ${type}</div>
            </div>
        `;
        grid.appendChild(a);
    });
}

renderSurahs(SURAHS);

document.getElementById("searchBar").addEventListener("input", function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { renderSurahs(SURAHS); return; }
    renderSurahs(SURAHS.filter(([num, translit,, english]) =>
        String(num).includes(q) ||
        translit.toLowerCase().includes(q) ||
        english.toLowerCase().includes(q)
    ));
});

document.getElementById("menuToggle").addEventListener("click", () => {
